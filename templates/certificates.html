<h2>My Certificates</h2>

{% if certs %}
<table border="1">
<tr>
<th>Certificate Number</th>
<th>Instrument</th>
<th>Download</th>
</tr>

{% for cert in certs %}
<tr>
<td>{{ cert.certificate_number }}</td>
<td>{{ cert.instrument }}</td>
<td>
<a href="{{ cert.certificate_file.url }}">Download</a>
</td>
</tr>
{% endfor %}

</table>

{% else %}
<p>No certificates available.</p>
{% endif %}
