<form method="POST">
    {% csrf_token %}
    <label>Certificate Number:</label>
    <input type="text" name="certificate_number" required>
    
    <label>Instrument Serial:</label>
    <input type="text" name="instrument_serial" required>
    
    <button type="submit">Search</button>
</form>

{% if cert %}
    <p>Certificate Found: {{ cert.certificate_file.url }}</p>
    <a href="{{ cert.certificate_file.url }}" download>Download Certificate</a>
{% elif cert is not none %}
    <p>No certificate found for your input.</p>
{% endif %}
